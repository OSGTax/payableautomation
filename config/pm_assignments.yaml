# PM-to-Job Assignment Configuration
# Update this file when jobs or PM assignments change.

project_managers:
  nick:
    name: "Nick"
    email: ""           # e.g. nick@yourcompany.com
    onedrive_folder: "" # e.g. C:\Users\You\OneDrive\PM Invoices\Nick
    jobs:
      - "25-002"  # STEP BY STEP - OGDENSBURG
      - "25-003"  # HAMMOND CSD CAPITAL PROJECT
      - "25-004"  # MALONE TRANSFER STATION
      - "25-008"  # OGDENSBURG CSD PHASE 1
      - "25-009"  # PROJECT VIOLET
      - "26-000"  # 2026 AJK Small Jobs

  frank:
    name: "Frank"
    email: ""           # e.g. frank@yourcompany.com
    onedrive_folder: "" # e.g. C:\Users\You\OneDrive\PM Invoices\Frank
    jobs:
      - "25-010"  # GRASSY GROVE SOLAR EAST
      - "25-011"  # SAWMILL BAY SOLAR

# Email settings for notifications
email:
  enabled: false        # Set to true once configured
  smtp_server: "smtp.office365.com"
  smtp_port: 587
  sender_email: ""      # Your Outlook email
  # Store password in .env file, NOT here (see .env.example)
  subject_template: "Invoices Ready for Coding - {date}"
  body_template: |
    Hi {pm_name},

    You have {invoice_count} invoice(s) ready for coding.

    Please open your folder and code the invoices:
    {folder_path}

    Thanks

# Keywords that help identify which job an invoice belongs to.
# Used during intake to suggest job/PM assignment.
# Format: keyword (case-insensitive) -> job number
job_keywords:
  "step by step": "25-002"
  "ogdensburg": "25-002"
  "hammond": "25-003"
  "malone": "25-004"
  "transfer station": "25-004"
  "ogdensburg csd": "25-008"
  "project violet": "25-009"
  "violet": "25-009"
  "champlain": "25-009"
  "cotton lane": "25-009"
  "grassy grove": "25-010"
  "sawmill bay": "25-011"
  "sawmill": "25-011"
  "ajk small": "26-000"
  "small jobs": "26-000"

# Overhead GL accounts - invoices with these vendors/accounts
# are typically coded by AP (you), not PMs.
overhead_accounts:
  - "5000"   # Vehicle Expense
  - "5400"   # Fuel
  - "5900"   # Shop Supplies
  - "6060"   # Truck Expense
  - "6130"   # Travel
  - "6310"   # Auto Parts
  - "6330"   # Hardware/Supplies
  - "6392"   # Meals
  - "6393"   # Lodging
